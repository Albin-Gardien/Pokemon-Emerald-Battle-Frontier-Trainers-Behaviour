<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Pokémon Emerald Frontier Trainer Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="main.css" />

    <script src="data/frontier_trainers.js"></script>
    <script src="data/trainer_teams.js"></script>
    <script src="data/frontier_mons.js"></script>
    <script src="data/translations.js"></script>
    <script src="data/moves.js"></script>
    <script src="data/moves_ai_routine.js"></script>
</head>

<body>
    <h1 id="page-title"></h1>

    <div class="language-switch">
        <button type="button" id="language-toggle">EN</button>
    </div>

    <div class="form-container">
        <form id="trainer-form" class="flex-column">
            <label for="trainer-text-input" id="trainer-label" class="trainer-label"></label>

            <div class="flex-row">
                <div class="autocomplete-field">
                    <input
                        type="text"
                        id="trainer-text-input"
                        autocomplete="off"
                    />
                    <div id="trainer-suggestions" class="suggestions-menu" hidden></div>
                </div>

                <select id="trainer-select"></select>

                <label for="level-input" class="level-field">
                    <span id="level-label"></span>
                    <input
                        type="number"
                        id="level-input"
                        class="level-input"
                        value="50"
                        min="1"
                        max="100"
                    />
                </label>

                <div class="series-filter-dropdown">
                    <button type="button" id="series-filter-button"></button>

                    <div id="series-filter-menu" class="series-filter-menu" hidden></div>
                </div>
            </div>
        </form>
    </div>

    <div class="results-container" id="results-container" hidden>
        <h2 id="trainer-title"></h2>
        <p id="trainer-info" class="muted"></p>

        <div id="opponent-search-container" class="opponent-search-container" hidden>
            <label for="opponent-pokemon-input" id="opponent-pokemon-label"></label>

            <div class="autocomplete-field">
                <input
                    type="text"
                    id="opponent-pokemon-input"
                    autocomplete="off"
                />
                <div id="opponent-pokemon-suggestions" class="suggestions-menu" hidden></div>
            </div>

            <select id="opponent-pokemon-select"></select>
        </div>

        <div id="selected-pokemon-details" class="selected-pokemon-details" hidden></div>

        <div class="table-wrapper">
            <table id="pokemon-results" class="pokemon-table"></table>
        </div>
    </div>

    <script src="scripts/constants.js"></script>
    <script src="scripts/app.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/trainer-search.js"></script>
    <script src="scripts/stats-calculations.js"></script>
    <script src="scripts/render-table.js"></script>
    <script src="scripts/pokemon-details.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Pokémon Emerald Frontier Trainer Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="main.css" />

  <script src="data/frontier_trainers.js"></script>
  <script src="data/trainer_teams.js"></script>
  <script src="data/frontier_mons.js"></script>
  <script src="data/translations.js"></script>
  <script src="data/moves.js"></script>
</head>

<body>
	<h1 id="page-title"></h1>

	<div class="language-switch">
	  <button type="button" id="language-toggle">EN</button>
	</div>

  <div class="form-container">
    <form id="trainer-form" class="flex-column">
      <label for="trainer-text-input" id="trainer-label" style="text-align:center"></label>

      <div class="flex-row">
		<div class="autocomplete-field">
			<input
				type="text"
				id="trainer-text-input"
				autocomplete="off"
			/>
			<div id="trainer-suggestions" class="suggestions-menu" hidden></div>
		</div>

        <select id="trainer-select"></select>

		<label for="level-input" class="level-field">
			<span id="level-label"></span>
			<input
				type="number"
				id="level-input"
				value="50"
				min="1"
				max="100"
				style="width: 80px"
			/>
		</label>

		<div class="series-filter-dropdown">
			<button type="button" id="series-filter-button">
			</button>

			<div id="series-filter-menu" class="series-filter-menu" hidden></div>
		</div>

        <button type="submit" id="show-button"></button>
      </div>
    </form>
  </div>

  <div class="results-container" id="results-container" style="display:none">
    <h2 id="trainer-title"></h2>
    <p id="trainer-info" class="muted"></p>

  <div id="opponent-search-container" class="opponent-search-container" style="display:none">
	<label for="opponent-pokemon-input" id="opponent-pokemon-label"></label>
		<div class="autocomplete-field">
			<input
				type="text"
				id="opponent-pokemon-input"
				autocomplete="off"
			/>
			<div id="opponent-pokemon-suggestions" class="suggestions-menu" hidden></div>
		</div>

	<select id="opponent-pokemon-select"></select>
  </div>

	<div id="selected-pokemon-details" class="selected-pokemon-details" style="display:none"></div>

    <div class="table-wrapper">
	  <table id="pokemon-results" class="pokemon-table"></table>
	</div>
  </div>

  <script>
    "use strict";

    // ---------------------------------------------------------------------

    // ---------------------------------------------------------------------

	let currentTrainer = null;
	let activeSeriesIds = new Set(["series_1", "series_2", "series_3", "series_4", "series_5", "series_6", "series_7", "series_8_plus"]);

	let trainerSuggestionMatches = [];

	let opponentSuggestionActiveIndex = -1;

    // ---------------------------------------------------------------------
    // Text, translation and display helpers
    // ---------------------------------------------------------------------

    // Normalizes user input to make search accent-insensitive and case-insensitive.
    function normalizeText(value) {
      return value
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/\p{Diacritic}/gu, "")
        .replace(/[^a-z0-9]/g, "");
    }

    // Translates UI labels by section/key.
    function tr(section, key) {
      return window.appTranslations[section]?.[key]?.[currentLang]
        ?? window.appTranslations[section]?.[key]?.en
        ?? key;
    }

    // Translates data values such as types, abilities, natures, items or moves.
	function t(category, id) {
		if (category === "moves") {
			return getMoveName(id);
		}

		return window.appTranslations[category]?.[id]?.[currentLang]
			?? window.appTranslations[category]?.[id]?.en
			?? id;
	}

    // Returns the translated entity name, falling back to English then ID.
    function getName(entity, lang = currentLang) {
      return entity.names?.[lang] ?? entity.names?.en ?? entity.id;
    }

    // Returns the language not currently displayed.
    function getOtherLang() {
      return currentLang === "fr" ? "en" : "fr";
    }

	function getPokemonSpriteSlug(mon) {
		return pokemonSpriteSlugOverrides[mon.speciesId] ?? mon.speciesId.replaceAll("_", "-");
	}

	function getPokemonSpriteUrl(mon) {
		return `${pokemonSpriteBaseUrl}/${getPokemonSpriteSlug(mon)}.png`;
	}

	function getPokemonFrontSpriteUrl(mon) {
		return `https://img.pokemondb.net/sprites/ruby-sapphire/normal/${getPokemonSpriteSlug(mon)}.png`;
	}

	function getItemSpriteUrl(itemId) {
		const path = itemSpriteMap[itemId];

		if (!path) {
			return null;
		}

		return `${itemSpriteBaseUrl}/${path}.png`;
	}

    // ---------------------------------------------------------------------
    // Language handling
    // ---------------------------------------------------------------------

    // Applies the current language to static UI and refreshes visible dynamic content.
    function applyLanguage() {
      document.documentElement.lang = currentLang;

	  document.title = tr("ui", "pageTitle");
      document.getElementById("page-title").textContent = tr("ui", "pageTitle");
	  document.getElementById("level-label").textContent = tr("ui", "levelLabel");
	  document.getElementById("opponent-pokemon-label").textContent = tr("ui", "opponentPokemonLabel");
	  document.getElementById("opponent-pokemon-input").placeholder = tr("ui", "opponentPokemonPlaceholder");
      document.getElementById("trainer-label").textContent = tr("ui", "trainerLabel");
      document.getElementById("trainer-text-input").placeholder = tr("ui", "trainerPlaceholder");
      document.getElementById("show-button").textContent = tr("ui", "showButton");
      document.getElementById("language-toggle").textContent = currentLang === "fr" ? "EN" : "FR";

      const select = document.getElementById("trainer-select");
      const selectedTrainerId = select.value;

	  updateSeriesFilterButtonLabel();
      populateTrainerSelect(selectedTrainerId);

      const trainer = getTrainerById(selectedTrainerId);

      if (trainer) {
        document.getElementById("trainer-text-input").value = getName(trainer);

        if (document.getElementById("results-container").style.display !== "none") {
          renderTrainerTeam(trainer);
        }
      }
    }

    // Switches between French and English.
    function toggleLanguage() {
      currentLang = currentLang === "fr" ? "en" : "fr";
      applyLanguage();
    }

    // ---------------------------------------------------------------------
    // Trainer data access and trainer search
    // ---------------------------------------------------------------------

    // Returns trainers in file order.
    function getTrainerList() {
      return Object.values(window.frontierTrainers);
    }

    // Finds a trainer by ID.
    function getTrainerById(trainerId) {
      return window.frontierTrainers.find(trainer => trainer.id === trainerId);
    }

    // Builds the searchable text for one trainer.
    function getTrainerSearchText(trainer) {
      return normalizeText([
        trainer.id,
        trainer.names?.fr,
        trainer.names?.en
      ].filter(Boolean).join(" "));
    }

	function populateTrainerSuggestions(search = "") {
		const menu = document.getElementById("trainer-suggestions");
		menu.replaceChildren();

		const normalizedSearch = normalizeText(search);

		if (normalizedSearch.length < 2) {
			menu.hidden = true;
			return;
		}

		const visibleIds = getVisibleTrainerIds();
		const matches = getTrainerList()
			.filter((trainer) => visibleIds.has(trainer.id))
			.filter((trainer) => getTrainerSearchText(trainer).includes(normalizedSearch))
			.slice(0, 12);

		if (matches.length === 0) {
			menu.hidden = true;
			return;
		}

		trainerSuggestionMatches = matches;
		trainerSuggestionActiveIndex = -1;

		matches.forEach((trainer, index) => {
			const item = document.createElement("div");
			item.className = "suggestion-item";
			item.textContent = getTrainerDisplayName(trainer);
			item.dataset.index = index;

			item.addEventListener("mousedown", (event) => {
				event.preventDefault();
				selectTrainerAndRender(trainer);
			});

			menu.appendChild(item);
		});

		menu.hidden = false;
	}

	function updateTrainerSuggestionActiveItem() {
		const items = document.querySelectorAll("#trainer-suggestions .suggestion-item");

		items.forEach((item, index) => {
			item.classList.toggle("active", index === trainerSuggestionActiveIndex);
		});
	}

	function selectActiveTrainerSuggestion() {
		const trainer = trainerSuggestionMatches[trainerSuggestionActiveIndex];

		if (trainer) {
			selectTrainerAndRender(trainer);
		}
	}

	function handleTrainerSuggestionKeyboard(event) {
		const menu = document.getElementById("trainer-suggestions");

		if (menu.hidden || trainerSuggestionMatches.length === 0) {
			return;
		}

		if (event.key === "ArrowDown") {
			event.preventDefault();
			trainerSuggestionActiveIndex =
				(trainerSuggestionActiveIndex + 1) % trainerSuggestionMatches.length;
			updateTrainerSuggestionActiveItem();
		}

		if (event.key === "ArrowUp") {
			event.preventDefault();
			trainerSuggestionActiveIndex =
				(trainerSuggestionActiveIndex - 1 + trainerSuggestionMatches.length) % trainerSuggestionMatches.length;
			updateTrainerSuggestionActiveItem();
		}

		if (event.key === "Enter" && trainerSuggestionActiveIndex >= 0) {
			event.preventDefault();
			selectActiveTrainerSuggestion();
		}

		if (event.key === "Escape") {
			menu.hidden = true;
		}
	}

	function getTrainerDisplayName(trainer) {
		const mainName = getName(trainer, currentLang);
		const secondaryName = getName(trainer, getOtherLang());

		return mainName === secondaryName ? mainName : `${mainName} (${secondaryName})`;
	}

	function createPlaceholderOption(label) {
		const option = document.createElement("option");
		option.value = "";
		option.textContent = label;
		option.disabled = true;
		option.selected = true;
		return option;
	}
	
    // Fills the trainer select while preserving the source data order.
	function populateTrainerSelect(selectedTrainerId = null) {
		const select = document.getElementById("trainer-select");
		const previousValue = selectedTrainerId ?? select.value;
		const activeSeries = getActiveSeries();

		select.replaceChildren();
		select.appendChild(createPlaceholderOption(tr("ui", "trainerSelectPlaceholder")));

		if (activeSeries.length === 0) {
			return;
		}

		if (activeSeries.length === 1) {
			for (const trainer of getTrainersForSeries(activeSeries[0])) {
			select.appendChild(createTrainerOption(trainer));
			}
		} else {
			for (const serie of activeSeries) {
			const optgroup = document.createElement("optgroup");
			optgroup.label = tr("series", serie.id);

			for (const trainer of getTrainersForSeries(serie)) {
				optgroup.appendChild(createTrainerOption(trainer));
			}

			select.appendChild(optgroup);
			}
		}

		const visibleIds = getVisibleTrainerIds();

		if (previousValue && visibleIds.has(previousValue)) {
			select.value = previousValue;
		}
		populateTrainerSuggestions();
	}

    // Synchronizes free text input and trainer select.
    function bindTextToTrainerSelect() {
      const input = document.getElementById("trainer-text-input");
      const select = document.getElementById("trainer-select");

      input.addEventListener("input", () => {
        const search = normalizeText(input.value);
		
		populateTrainerSuggestions(input.value);

        if (!search) {
          select.value = "";
          return;
        }

		const options = Array.from(select.options);
		const matchingOption = options.find((option) => {
			const trainer = getTrainerById(option.value);
			return trainer && getTrainerSearchText(trainer).includes(search);
		});

        if (matchingOption) {
          select.value = matchingOption.value;
        }
      });

	input.addEventListener("blur", () => {
		setTimeout(() => {
			document.getElementById("trainer-suggestions").hidden = true;
		}, 100);
	});

		select.addEventListener("change", () => {
			const trainer = getTrainerById(select.value);
			selectTrainerAndRender(trainer);
		});
    }

	function populateSeriesFilter() {
		const menu = document.getElementById("series-filter-menu");
		menu.replaceChildren();

		for (const serie of frontierSeries) {
			const label = document.createElement("label");
			label.className = "series-filter-item";

			const checkbox = document.createElement("input");
			checkbox.type = "checkbox";
			checkbox.value = serie.id;
			checkbox.checked = activeSeriesIds.has(serie.id);

			checkbox.addEventListener("change", () => {
			if (checkbox.checked) {
				activeSeriesIds.add(serie.id);
			} else {
				activeSeriesIds.delete(serie.id);
			}

			populateTrainerSelect();
			syncTrainerInputWithSelect();
			updateSeriesFilterButtonLabel();
			});

			label.append(checkbox, tr("series", serie.id));
			menu.appendChild(label);
		}

		updateSeriesFilterButtonLabel();
	}

	function toggleSeriesFilterMenu() {
		const menu = document.getElementById("series-filter-menu");
		menu.hidden = !menu.hidden;
	}

	function closeSeriesFilterMenu() {
		document.getElementById("series-filter-menu").hidden = true;
	}

	function updateSeriesFilterButtonLabel() {
		const button = document.getElementById("series-filter-button");
		const count = activeSeriesIds.size;

		button.textContent = count === frontierSeries.length
			? tr("ui", "allSeries")
			: `${count} ${tr("ui", "selectedSeriesCount")}`;
	}

	function getActiveSeries() {
		return frontierSeries.filter((serie) => activeSeriesIds.has(serie.id));
	}

	function getTrainersForSeries(serie) {
		return getTrainerList().filter((trainer) =>
			trainer.number >= serie.start && trainer.number <= serie.end
		);
	}

	function getVisibleTrainerIds() {
		const ids = new Set();

		for (const serie of getActiveSeries()) {
			for (const trainer of getTrainersForSeries(serie)) {
			ids.add(trainer.id);
			}
		}

		return ids;
	}

	function createTrainerOption(trainer) {
		const option = document.createElement("option");
		option.value = trainer.id;

		const mainName = getName(trainer, currentLang);
		const secondaryName = getName(trainer, getOtherLang());

		option.textContent = mainName === secondaryName ? mainName : `${mainName} (${secondaryName})`;

		return option;
	}

	function syncTrainerInputWithSelect() {
		const select = document.getElementById("trainer-select");
		const input = document.getElementById("trainer-text-input");
		const trainer = getTrainerById(select.value);

		input.value = trainer ? getName(trainer) : "";
	}

	function findTrainerByInputValue(value) {
		const normalizedValue = normalizeText(value);
		const visibleIds = getVisibleTrainerIds();

		return getTrainerList().find((trainer) => {
			if (!visibleIds.has(trainer.id)) {
			return false;
			}

			return (
			normalizeText(getTrainerDisplayName(trainer)) === normalizedValue ||
			normalizeText(getName(trainer, "fr")) === normalizedValue ||
			normalizeText(getName(trainer, "en")) === normalizedValue
			);
		});
	}

	function setSpriteTextCell(td, imageUrl, text, altText, spriteKind = "item") {
		const wrapper = document.createElement("span");
		wrapper.className = "sprite-text-cell";

		if (imageUrl) {
			const wrapperImg = document.createElement("span");
			wrapperImg.className =
			spriteKind === "pokemon"
				? "pokemon-sprite-wrapper"
				: "item-sprite-wrapper";

			const img = document.createElement("img");
			img.className =
			spriteKind === "pokemon"
				? "pokemon-cell-sprite"
				: "item-cell-sprite";

			img.src = imageUrl;
			img.alt = altText ?? "";
			img.loading = "lazy";

			img.addEventListener("error", () => {
			wrapperImg.remove();
			});

			wrapperImg.appendChild(img);
			wrapper.appendChild(wrapperImg);
		}

		const label = document.createElement("span");
		label.textContent = text ?? "";
		wrapper.appendChild(label);

		td.replaceChildren(wrapper);
	}


    // ---------------------------------------------------------------------
    // Battle data helpers: natures, types, moves and stats
    // ---------------------------------------------------------------------

    // Returns the stat boosted by a nature, if any.
    function getNatureBoostedStat(natureId) {
      return natureModifiers[natureId]?.up ?? "";
    }

    // Returns the nature multiplier for one stat.
    function getNatureMultiplier(natureId, statKey) {
      const modifier = natureModifiers[natureId];

      if (!modifier) {
        return 1;
      }

      if (modifier.up === statKey) {
        return 1.1;
      }

      if (modifier.down === statKey) {
        return 0.9;
      }

      return 1;
    }

    // Applies Pokémon type colors to a table cell.
    function applyTypeColor(td, typeId) {
      if (!typeId) return;

      const colors = typeColors[typeId];
      if (!colors) return;

      td.style.backgroundColor = colors.bg;
      td.style.color = colors.text;
      td.style.fontWeight = "700";
    }

    // Returns the type of a move from moves.js.
    function getMoveType(moveId) {
      return window.moves?.[moveId]?.type ?? null;
    }

    // Calculates the HP stat using Gen 3 stat formula.
    function calculateHpStat(base, iv, ev, level) {
      return Math.floor(((2 * base + iv + Math.floor(ev / 4)) * level) / 100) + level + 10;
    }

    // Calculates non-HP stats using Gen 3 stat formula and nature modifier.
    function calculateOtherStat(base, iv, ev, level, natureId, statKey) {
      const rawStat = Math.floor(((2 * base + iv + Math.floor(ev / 4)) * level) / 100) + 5;
      return Math.floor(rawStat * getNatureMultiplier(natureId, statKey));
    }

    // Calculates all displayed stats for one Pokémon set.
    function calculateStats(mon, iv, level) {
      return {
        hp: calculateHpStat(mon.baseStats.hp, iv, mon.evs.hp ?? 0, level),
        atk: calculateOtherStat(mon.baseStats.atk, iv, mon.evs.atk ?? 0, level, mon.nature, "atk"),
        def: calculateOtherStat(mon.baseStats.def, iv, mon.evs.def ?? 0, level, mon.nature, "def"),
        spa: calculateOtherStat(mon.baseStats.spa, iv, mon.evs.spa ?? 0, level, mon.nature, "spa"),
        spd: calculateOtherStat(mon.baseStats.spd, iv, mon.evs.spd ?? 0, level, mon.nature, "spd"),
        spe: calculateOtherStat(mon.baseStats.spe, iv, mon.evs.spe ?? 0, level, mon.nature, "spe")
      };
    }

    // Returns the EV color class for a stat cell.
    function getEvClass(ev) {
      if (ev >= 255) {
        return "ev-max";
      }

      if (ev >= 170) {
        return "ev-mid";
      }

      return "";
    }

    // ---------------------------------------------------------------------
    // Table rendering helpers
    // ---------------------------------------------------------------------

    // Creates the translated table header.
    function createPokemonTableHead() {
      const thead = document.createElement("thead");
      thead.innerHTML = `
        <tr>
          <th>${tr("columns", "name")}</th>
          <th>${tr("columns", "set")}</th>
          <th>${tr("columns", "type1")}</th>
          <th>${tr("columns", "type2")}</th>
          <th>${tr("columns", "ability1")}</th>
          <th>${tr("columns", "ability2")}</th>
          <th>${tr("columns", "nature")}</th>
          <th>${tr("columns", "item")}</th>
          <th>${tr("columns", "hp")}</th>
          <th>${tr("columns", "attack")}</th>
          <th>${tr("columns", "defense")}</th>
          <th>${tr("columns", "spAtk")}</th>
          <th>${tr("columns", "spDef")}</th>
          <th>${tr("columns", "speed")}</th>
          <th>${tr("columns", "move1")}</th>
          <th>${tr("columns", "move2")}</th>
          <th>${tr("columns", "move3")}</th>
          <th>${tr("columns", "move4")}</th>
        </tr>
      `;
      return thead;
    }

    // Returns the data used to create one Pokémon table row.
    function getPokemonRowCells(mon, trainer, stats) {
      const ability1 = mon.abilities[0] ? t("abilities", mon.abilities[0]) : "";
      const ability2 = mon.abilities[1] ? t("abilities", mon.abilities[1]) : "";

      return [
        getName(mon),
        mon.setNumber,
        t("types", mon.types[0]),
        mon.types[1] ? t("types", mon.types[1]) : "",
        ability1,
        ability2,
        {
          value: t("natures", mon.nature),
          className: getNatureBoostedStat(mon.nature) ? `nature-boost-${getNatureBoostedStat(mon.nature)}` : ""
        },
        t("items", mon.item),

        { value: stats.hp, className: getEvClass(mon.evs.hp ?? 0), statKey: "hp" },
        { value: stats.atk, className: getEvClass(mon.evs.atk ?? 0), statKey: "atk" },
        { value: stats.def, className: getEvClass(mon.evs.def ?? 0), statKey: "def" },
        { value: stats.spa, className: getEvClass(mon.evs.spa ?? 0), statKey: "spa" },
        { value: stats.spd, className: getEvClass(mon.evs.spd ?? 0), statKey: "spd" },
        { value: stats.spe, className: getEvClass(mon.evs.spe ?? 0), statKey: "spe" },

        t("moves", mon.moves[0]),
        t("moves", mon.moves[1]),
        t("moves", mon.moves[2]),
        t("moves", mon.moves[3])
      ];
    }

    // Applies extra classes and type colors to one row cell.
	function applyCellPresentation(td, cellData, index, mon) {
		if (cellData !== null && typeof cellData === "object") {
			td.textContent = cellData.value ?? "";

			if (cellData.className) {
			td.classList.add(cellData.className);
			}

			if (cellData.statKey) {
			td.classList.add(cellData.statKey);
			}
		} else {
			td.textContent = cellData ?? "";
		}

		if (index === 0) {
			setSpriteTextCell(td, getPokemonSpriteUrl(mon), getName(mon), getName(mon), "pokemon");
		}

		if (index === 2) {
			applyTypeColor(td, mon.types[0]);
		}

		if (index === 3 && mon.types[1]) {
			applyTypeColor(td, mon.types[1]);
		}

		if (index === 7) {
			setSpriteTextCell(td, getItemSpriteUrl(mon.item), t("items", mon.item), t("items", mon.item), "item");
		}

		if (index >= 14 && index <= 17) {
			const moveId = mon.moves[index - 14];
			const moveType = getMoveType(moveId);
			applyTypeColor(td, moveType);
		}
	}

    // Creates one table row for one Pokémon set.
    function createPokemonTableRow(mon, trainer, level) {
      const stats = calculateStats(mon, trainer.ivTier, level);
      const cells = getPokemonRowCells(mon, trainer, stats);
      const row = document.createElement("tr");

      cells.forEach((cellData, index) => {
        const td = document.createElement("td");
        applyCellPresentation(td, cellData, index, mon);
        row.appendChild(td);
      });

      return row;
    }

    // Creates one fallback row when a Pokémon set is missing.
    function createMissingSetRow(setId) {
      const row = document.createElement("tr");
      const cell = row.insertCell();
      cell.colSpan = 18;
      cell.textContent = `${tr("ui", "missingSet")} : ${setId}`;
      return row;
    }

    // ---------------------------------------------------------------------
    // Main trainer team rendering
    // ---------------------------------------------------------------------

    // Renders the selected trainer and all possible Pokémon sets.
    function renderTrainerTeam(trainer) {
      const resultsContainer = document.getElementById("results-container");
      const trainerTitle = document.getElementById("trainer-title");
      const trainerInfo = document.getElementById("trainer-info");
      const pokemonTable = document.getElementById("pokemon-results");
      const team = window.frontierTrainerTeams[trainer.poolId];

      trainerTitle.textContent = getName(trainer);
      trainerInfo.textContent = `${tr("ui", "iv")} : ${trainer.ivTier} — ${tr("ui", "pool")} : ${trainer.poolId.toUpperCase()}`;
      pokemonTable.replaceChildren();

      if (!team) {
        const row = pokemonTable.insertRow();
        const cell = row.insertCell();
        cell.textContent = tr("ui", "noTeamFound");
        resultsContainer.style.display = "";
        return;
      }

      const level = getSelectedLevel();
	  const availableMons = getTrainerMonsForLevel(trainer, level);
      const tbody = document.createElement("tbody");

	  for (const mon of availableMons) {
		const row = createPokemonTableRow(mon, trainer, level);
		tbody.appendChild(row);
	  }

      pokemonTable.append(createPokemonTableHead(), tbody);
      resultsContainer.style.display = "";
	  populateOpponentPokemonSelect(trainer);
    }

	function getTrainerMons(trainer) {
	  const team = window.frontierTrainerTeams[trainer.poolId];

	  if (!team) {
		return [];
	  }

	  return team.setIds
		.map((setId) => window.frontierMons[setId])
		.filter(Boolean);
	}

	function selectTrainerAndRender(trainer) {
		if (!trainer) {
			return;
		}

		currentTrainer = trainer;

		document.getElementById("trainer-text-input").value = getName(trainer);
		document.getElementById("trainer-select").value = trainer.id;
		document.getElementById("trainer-suggestions").hidden = true;

		renderTrainerTeam(trainer);
	}

    // ---------------------------------------------------------------------
    // Pokémon focus
    // ---------------------------------------------------------------------

	function getSelectedPokemonSets(trainer, speciesId) {
		const level = getSelectedLevel();

		return getTrainerMonsForLevel(trainer, level)
			.filter((mon) => mon.speciesId === speciesId);
	}

	function findOpponentPokemonByInputValue(trainer, value) {
		const normalizedValue = normalizeText(value);
		const level = getSelectedLevel();
		const mons = getTrainerMonsForLevel(trainer, level);

		return mons.find((mon) =>
			normalizeText(getPokemonDisplayName(mon)) === normalizedValue ||
			normalizeText(getName(mon, "fr")) === normalizedValue ||
			normalizeText(getName(mon, "en")) === normalizedValue
		);
	}

	function getPokemonDisplayName(mon) {
		const mainName = getName(mon, currentLang);
		const secondaryName = getName(mon, getOtherLang());

		return mainName === secondaryName ? mainName : `${mainName} (${secondaryName})`;
	}

	function selectOpponentPokemonAndRender(mon) {
		if (!currentTrainer || !mon) {
			return;
		}

		document.getElementById("opponent-pokemon-input").value = getName(mon);
		document.getElementById("opponent-pokemon-select").value = mon.speciesId;
		document.getElementById("opponent-pokemon-suggestions").hidden = true;

		renderSelectedPokemonDetails(currentTrainer, mon.speciesId);
	}

	function populateOpponentPokemonSelect(trainer) {
		const container = document.getElementById("opponent-search-container");
		const input = document.getElementById("opponent-pokemon-input");
		const select = document.getElementById("opponent-pokemon-select");
		const level = getSelectedLevel();
		const mons = getTrainerMonsForLevel(trainer, level);

		const uniqueSpecies = [];

		for (const mon of mons) {
			if (!uniqueSpecies.some((existing) => existing.speciesId === mon.speciesId)) {
			uniqueSpecies.push(mon);
			}
		}
		populateOpponentPokemonSuggestions(uniqueSpecies, "");

		select.replaceChildren();
		select.appendChild(createPlaceholderOption(tr("ui", "opponentPokemonSelectPlaceholder")));

		for (const mon of uniqueSpecies) {
			const option = document.createElement("option");
			option.value = mon.speciesId;

			const mainName = getName(mon, currentLang);
			const secondaryName = getName(mon, getOtherLang());

			option.textContent =
			mainName === secondaryName ? mainName : `${mainName} (${secondaryName})`;

			select.appendChild(option);
		}

		input.value = "";
		container.style.display = "";
		document.getElementById("selected-pokemon-details").style.display = "none";
	}

	function populateOpponentPokemonSuggestions(uniqueSpecies, search = "") {
		const menu = document.getElementById("opponent-pokemon-suggestions");
		menu.replaceChildren();

		const normalizedSearch = normalizeText(search);

		if (normalizedSearch.length < 2) {
			menu.hidden = true;
			return;
		}

		const matches = uniqueSpecies
			.filter((mon) =>
			normalizeText(getPokemonDisplayName(mon)).includes(normalizedSearch) ||
			normalizeText(getName(mon, "fr")).includes(normalizedSearch) ||
			normalizeText(getName(mon, "en")).includes(normalizedSearch)
			)
			.slice(0, 12);

		if (matches.length === 0) {
			menu.hidden = true;
			return;
		}

		opponentSuggestionMatches = matches;
		opponentSuggestionActiveIndex = -1;

		matches.forEach((mon, index) => {
			const item = document.createElement("div");
			item.className = "suggestion-item";
			item.textContent = getPokemonDisplayName(mon);
			item.dataset.index = index;

			item.addEventListener("mousedown", (event) => {
				event.preventDefault();
				selectOpponentPokemonAndRender(mon);
			});

			menu.appendChild(item);
		});

		menu.hidden = false;
	}

	function updateOpponentSuggestionActiveItem() {
		const items = document.querySelectorAll("#opponent-pokemon-suggestions .suggestion-item");

		items.forEach((item, index) => {
			item.classList.toggle("active", index === opponentSuggestionActiveIndex);
		});
	}

	function handleOpponentSuggestionKeyboard(event) {
		const menu = document.getElementById("opponent-pokemon-suggestions");

		if (menu.hidden || opponentSuggestionMatches.length === 0) {
			return;
		}

		if (event.key === "ArrowDown") {
			event.preventDefault();
			opponentSuggestionActiveIndex =
				(opponentSuggestionActiveIndex + 1) % opponentSuggestionMatches.length;
			updateOpponentSuggestionActiveItem();
		}

		if (event.key === "ArrowUp") {
			event.preventDefault();
			opponentSuggestionActiveIndex =
				(opponentSuggestionActiveIndex - 1 + opponentSuggestionMatches.length) % opponentSuggestionMatches.length;
			updateOpponentSuggestionActiveItem();
		}

		if (event.key === "Enter" && opponentSuggestionActiveIndex >= 0) {
			event.preventDefault();
			selectOpponentPokemonAndRender(opponentSuggestionMatches[opponentSuggestionActiveIndex]);
		}

		if (event.key === "Escape") {
			menu.hidden = true;
		}
	}

	function renderSelectedPokemonDetails(trainer, speciesId) {
		const container = document.getElementById("selected-pokemon-details");
		const sets = getSelectedPokemonSets(trainer, speciesId);

		container.replaceChildren();

		if (sets.length === 0) {
			container.style.display = "none";
			return;
		}

		const level = getSelectedLevel();

		for (const mon of sets) {
			const stats = calculateStats(mon, trainer.ivTier, level);
			const card = buildPokemonDetailCard(mon, stats, trainer.ivTier);
			container.appendChild(card);
		}

		container.style.display = "";
	}

	function getSelectedLevel() {
		const input = document.getElementById("level-input");
		const level = Number(input.value);

		if (level === 50) {
			return 50;
		}

		if (level >= 60 && level <= 100) {
			return level;
		}

		input.value = 50;
		return 50;
	}

	function isMonAllowedAtLevel(mon, level) {
		if (level === 50 && forbiddenLevel50Species.has(mon.speciesId)) {
			return false;
		}

		return true;
	}

	function getTrainerMonsForLevel(trainer, level) {
		return getTrainerMons(trainer).filter((mon) => isMonAllowedAtLevel(mon, level));
	}

    // ---------------------------------------------------------------------
    // Initialization and events
    // ---------------------------------------------------------------------

    // Handles trainer form submission.
    function handleTrainerSubmit(event) {
      event.preventDefault();

      const select = document.getElementById("trainer-select");
      const trainer =
		findTrainerByInputValue(document.getElementById("trainer-text-input").value) ??
		getTrainerById(select.value);

      if (!trainer) {
        return;
      }
	  currentTrainer = trainer;
      renderTrainerTeam(trainer);
    }

	function buildPokemonDetailCard(mon, stats, ivTier) {
		const card = document.createElement("article");
		card.className = "pokemon-detail-card";

		const title = document.createElement("h3");
		title.textContent = `${getName(mon)} ${mon.setNumber ?? ""}`;

		const content = document.createElement("div");
		content.className = "pokemon-detail-content";

		const sprite = document.createElement("img");
		sprite.className = "pokemon-detail-sprite";
		sprite.src = getPokemonFrontSpriteUrl(mon);
		sprite.alt = getName(mon);
		sprite.loading = "lazy";

		const info = document.createElement("div");
		info.className = "pokemon-detail-info";

		const itemSpriteUrl = getItemSpriteUrl(mon.item);

		info.innerHTML = `
			<p><strong>${tr("columns", "type1").replace(" 1", "s")} :</strong> ${mon.types.map((type) => t("types", type)).join(" / ")}</p>
			<p><strong>${tr("columns", "ability1").replace(" 1", "s")} :</strong> ${mon.abilities.map((ability) => t("abilities", ability)).join(" / ")}</p>
			<p><strong>${tr("columns", "nature")} :</strong> ${t("natures", mon.nature)}</p>
			<p class="pokemon-detail-item">
				<strong>${tr("columns", "item")} :</strong>
				<span>${t("items", mon.item)}</span>
				${itemSpriteUrl ? `<img class="pokemon-detail-item-sprite" src="${itemSpriteUrl}" alt="${t("items", mon.item)}" loading="lazy">` : ""}
			</p>
			<p><strong>${tr("columns", "iv")} :</strong> ${ivTier}</p>
		`;

		const statsBlock = buildStatsBlock(stats);
		const movesBlock = buildMovesBlock(mon.moves);

		content.append(sprite, info, statsBlock);
		card.append(title, content, movesBlock);

		return card;
	}

	function buildStatsBlock(stats) {
		const statMax = Math.max(stats.hp, stats.atk, stats.def, stats.spa, stats.spd, stats.spe);

		const statsBlock = document.createElement("div");
		statsBlock.className = "pokemon-detail-stats";

		const rows = [
			[tr("statLabels", "hp"), stats.hp],
			[tr("statLabels", "atk"), stats.atk],
			[tr("statLabels", "def"), stats.def],
			[tr("statLabels", "spa"), stats.spa],
			[tr("statLabels", "spd"), stats.spd],
			[tr("statLabels", "spe"), stats.spe]
		];

		for (const [label, value] of rows) {
			const row = document.createElement("div");
			row.className = "stat-bar-row";

			const percentage = Math.round((value / statMax) * 100);

			row.innerHTML = `
			<span class="stat-label">${label}</span>
			<div class="stat-bar-background">
				<div
					class="stat-bar-fill"
					style="width:${percentage}%; background-color:${getStatBarColor(value)}"
				></div>
			</div>
			<span class="stat-value">${value}</span>
			`;

			statsBlock.appendChild(row);
		}

		return statsBlock;
	}

	function clamp(value, min, max) {
		return Math.max(min, Math.min(max, value));
	}

	function getStatBarColor(statValue) {
		const cappedStat = clamp(statValue, 0, 255);

		const red = clamp(511 - 2 * cappedStat, 0, 255);
		const green = clamp(2 * cappedStat, 0, 255);

		return `rgb(${red}, ${green}, 0)`;
	}

	function getMoveName(moveId) {
		const move = window.moves?.[moveId];

		return move?.names?.[currentLang]
			?? move?.names?.en
			?? window.appTranslations.moves?.[moveId]?.[currentLang]
			?? window.appTranslations.moves?.[moveId]?.en
			?? moveId;
	}

	function getMovePowerPoints(moveId) {
		return window.moves?.[moveId]?.power_points ?? "";
	}

	function buildMovesBlock(moveIds) {
		const movesBlock = document.createElement("div");
		movesBlock.className = "pokemon-detail-moves";

		const title = document.createElement("p");
		title.className = "moves-title";
		title.textContent = tr("ui", "movesTitle");

		const grid = document.createElement("div");
		grid.className = "moves-grid";

		for (const moveId of moveIds) {
			const move = document.createElement("div");
			move.className = "move-detail";

			const moveType = getMoveType(moveId);
			applyTypeColor(move, moveType);

			move.textContent = `${getMoveName(moveId)} — ${getMovePowerPoints(moveId)} ${tr("ui", "pp")}`;

			grid.appendChild(move);
		}

		movesBlock.append(title, grid);

		return movesBlock;
	}


    // Initializes the page after data files are loaded.
    function initApp() {
	  populateSeriesFilter();
      populateTrainerSelect();
      applyLanguage();
      bindTextToTrainerSelect();

      document.getElementById("language-toggle").addEventListener("click", toggleLanguage);
      document.getElementById("trainer-form").addEventListener("submit", handleTrainerSubmit);

	  document.getElementById("series-filter-button").addEventListener("click", (event) => {
		event.stopPropagation();
		toggleSeriesFilterMenu();
	  });

	document.getElementById("trainer-text-input").addEventListener("keydown", handleTrainerSuggestionKeyboard);
	document.getElementById("opponent-pokemon-input").addEventListener("keydown", handleOpponentSuggestionKeyboard);

	  document.addEventListener("click", (event) => {
		const dropdown = document.querySelector(".series-filter-dropdown");

		if (!dropdown.contains(event.target)) {
			closeSeriesFilterMenu();
		}
	  });
	  document.getElementById("level-input").addEventListener("change", () => {
		if (!currentTrainer) {
			return;
		}

		renderTrainerTeam(currentTrainer);
		document.getElementById("selected-pokemon-details").style.display = "none";
	  });
	  
	  document.getElementById("opponent-pokemon-select").addEventListener("change", (event) => {
		if (!currentTrainer || !event.target.value) {
			document.getElementById("selected-pokemon-details").style.display = "none";
			return;
		}

		renderSelectedPokemonDetails(currentTrainer, event.target.value);
	  });

		document.getElementById("opponent-pokemon-input").addEventListener("input", (event) => {
			if (!currentTrainer) {
				return;
			}

			const level = getSelectedLevel();
			const mons = getTrainerMonsForLevel(currentTrainer, level);
			const uniqueSpecies = [];

			for (const mon of mons) {
				if (!uniqueSpecies.some((existing) => existing.speciesId === mon.speciesId)) {
				uniqueSpecies.push(mon);
				}
			}

			populateOpponentPokemonSuggestions(uniqueSpecies, event.target.value);
		});

		document.getElementById("opponent-pokemon-input").addEventListener("blur", () => {
			setTimeout(() => {
				document.getElementById("opponent-pokemon-suggestions").hidden = true;
			}, 100);
		});

		document.getElementById("opponent-pokemon-input").addEventListener("change", (event) => {
			if (!currentTrainer) {
				return;
			}

			const mon = findOpponentPokemonByInputValue(currentTrainer, event.target.value);
			selectOpponentPokemonAndRender(mon);
		});
    }

    document.addEventListener("DOMContentLoaded", initApp);
  </script>
